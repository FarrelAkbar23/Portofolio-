<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Portofolio Farrel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: #0a1f44;
      color: white;
    }

    .navbar ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
    }

    .btn {
      background: red;
      padding: 10px 20px;
      border-radius: 5px;
    }

    /* HERO */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px;
      background: linear-gradient(to right, #0a1f44, #0d2d63);
      color: white;
    }

    .hero-text h1 {
      font-size: 40px;
    }

    .hero-text p {
      margin: 15px 0;
    }

    .hero button {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .blue {
      background: #1e73ff;
      color: white;
    }

    .red {
      background: red;
      color: white;
    }

    .hero img {
      width: 250px;
      border-radius: 10px;
    }

    /* SKILLS */
    .skills {
      padding: 40px;
      background: white;
    }

    .skills h2 {
      margin-bottom: 20px;
    }

    .skill-box {
      display: flex;
      gap: 20px;
    }

    .skill {
      background: #eee;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 100px;
    }

    /* PROJECT */
    .projects {
      padding: 40px;
    }

    .project-box {
      display: flex;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Farrel Akbar</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Blog</a></li>
  </ul>
  <a href="#" class="btn">Contact Me</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Hi, I'm Farrel</h1>
    <h2>I Create Modern Web Solutions</h2>
    <p>Membuat website cepat dan responsif sesuai kebutuhanmu.</p>
    <button class="blue">My Projects</button>
    <button class="red">Contact Me</button>
  </div>
  <img src="fotoku.jpg" alt="fotoku">
</div>

<!-- SKILLS -->
<div class="skills">
  <h2>Skills</h2>
  <div class="skill-box">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">React</div>
  </div>
</div>

<!-- PROJECT -->
<div class="projects">
  <h2>Recent Projects</h2>
  <div class="project-box">
    <div class="card">
      <img src="foto.jpg">
      <p>Landing Page</p>
    </div>
    <div class="card">
      <img src="farrel.png">
      <p>Portfolio</p>
    </div>
    <div class="card">
      <img src="gambar.png">
      <p>E-Commerce</p>
    </div>
  </div>
</div>

</body>
</html>
